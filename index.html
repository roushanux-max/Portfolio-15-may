<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roushan Portfolio</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --secondary: #666666;
            --accent: #0070f3;
            --card-bg: #f5f5f7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            padding: 80px 0 40px;
            border-bottom: 1px solid #eee;
            margin-bottom: 60px;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 16px 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.25rem;
            color: var(--secondary);
            max-width: 600px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 60px 0 30px;
            padding-left: 20px;
            border-left: 4px solid var(--accent);
        }
        /* Grid Layouts */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .card-content {
            padding: 20px;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .card-text {
            color: var(--secondary);
            font-size: 0.95rem;
        }
        /* Full Width Images */
        .full-width-img {
            width: 100%;
            border-radius: 12px;
            margin: 40px 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        /* Typography Content */
        .content-block {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 24px;
            max-width: 800px;
        }
        .content-block p {
            margin-bottom: 1.5em;
        }
        /* Video Container */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin: 40px 0;
            background: #000;
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Loading State */
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            color: var(--secondary);
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app" class="loading">Loading portfolio content...</div>

    <script>
        fetch('framer-content.json')
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById('app');
                let html = '';

                // Header
                html += `<header><div class="container">`;
                html += `<h1>${data.title || 'My Portfolio'}</h1>`;
                if(data.metaDescription) html += `<p class="subtitle">${data.metaDescription}</p>`;
                html += `</div></header>`;
                
                html += `<div class="container">`;

                // Headings & Text Content
                if (data.headings && data.headings.length > 0) {
                    data.headings.forEach(h => {
                        if(h.tag === 'H1') return; // Skip H1, already used
                        html += `<${h.tag.toLowerCase()} class="section-title">${h.text}</${h.tag.toLowerCase()}>`;
                    });
                }

                if (data.paragraphs && data.paragraphs.length > 0) {
                    html += `<div class="content-block">`;
                    data.paragraphs.forEach(p => {
                        html += `<p>${p}</p>`;
                    });
                    html += `</div>`;
                }

                // Images Grid
                if (data.images && data.images.length > 0) {
                    html += `<h2 class="section-title">Visuals</h2><div class="gallery">`;
                    data.images.forEach((img, index) => {
                        html += `
                            <div class="card">
                                <img src="${img.src}" alt="${img.alt || 'Project image'}" loading="lazy">
                                <div class="card-content">
                                    <div class="card-title">${img.alt || 'Image ' + (index+1)}</div>
                                    <div class="card-text">High resolution asset</div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                // Videos
                if (data.videos && data.videos.length > 0) {
                    html += `<h2 class="section-title">Media</h2>`;
                    data.videos.forEach(vid => {
                        if (vid.type === 'embed') {
                            html += `<div class="video-container"><iframe src="${vid.src}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else {
                            html += `<div class="video-container"><video controls src="${vid.src}"></video></div>`;
                        }
                    });
                }

                html += `</div>`; // End container
                app.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('app').innerHTML = `<div class="container"><p>Error loading content. Ensure framer-content.json exists.</p></div>`;
                console.error(err);
            });
    </script>
</body>
</html>
